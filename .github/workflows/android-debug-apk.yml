name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android-debug:
    name: Export APK
    runs-on: ubuntu-latest

    env:
      GODOT_VERSION: 4.6.3
      GODOT_RELEASE: stable
      EXPORT_PRESET: Android Debug
      APK_PATH: export/dead-shift-debug.apk

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget openjdk-17-jdk

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          yes | sdkmanager --licenses >/dev/null

      - name: Download Godot
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip"
          mv "Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64" godot
          chmod +x godot
          ./godot --version

      - name: Install Android export templates
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          unzip -q "Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          mkdir -p "${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}"
          mv templates/* "${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/"

      - name: Create Android debug keystore
        run: |
          mkdir -p "${HOME}/.android"
          keytool -genkeypair \
            -v \
            -keystore "${HOME}/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure Godot Android editor settings
        run: |
          mkdir -p "${HOME}/.config/godot"
          cat > "${HOME}/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/java_sdk_path = "${JAVA_HOME_17_X64}"
          export/android/debug_keystore = "${HOME}/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Configure Android export preset credentials
        run: |
          python3 - <<'PY'
          from pathlib import Path

          preset = Path("export_presets.cfg")
          text = preset.read_text()
          replacements = {
              'keystore/debug=""': 'keystore/debug="/home/runner/.android/debug.keystore"',
              'keystore/debug_user=""': 'keystore/debug_user="androiddebugkey"',
              'keystore/debug_password=""': 'keystore/debug_password="android"',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          preset.write_text(text)
          PY

      - name: Import project once
        run: |
          ./godot --headless --path . --quit

      - name: Run gameplay smoke test
        run: |
          ./godot --headless --path . -s tests/SmokeTest.gd

      - name: Run phone viewport UI test
        run: |
          ./godot --headless --path . -s tests/SceneUiTest.gd

      - name: Run project Android config test
        run: |
          ./godot --headless --path . -s tests/ProjectConfigTest.gd

      - name: Export debug APK
        timeout-minutes: 20
        run: |
          mkdir -p export
          ./godot --headless --verbose --path . --export-debug "${EXPORT_PRESET}" "${APK_PATH}"
          test -f "${APK_PATH}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dead-shift-debug-apk
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
